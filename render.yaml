services:
  - type: web
    name: wakil-ai-neural-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard  # 2 GB RAM - needed for the AI model
    region: frankfurt
    envVars:
      - key: MODEL_SIZE
        value: small   # Change to "large" for Phi-3-mini (needs Pro plan)
      - key: PORT
        value: 8080
    healthCheckPath: /health
